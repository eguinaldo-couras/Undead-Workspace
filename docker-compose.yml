version: "3.9"

# As variaveis sao lidas do arquivo config/secrets/.env.<env> via:
#   docker compose --env-file config/secrets/.env.dev up -d
# ou pelo script:  make services-up

services:
  postgres:
    image: postgres:16-alpine
    container_name: undead-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: undead
      # Variaveis repassadas ao init-db.sh para criacao dos bancos de app
      ADMIN_PORTAL_DB_USER: ${ADMIN_PORTAL_DB_USER}
      ADMIN_PORTAL_DB_PASSWORD: ${ADMIN_PORTAL_DB_PASSWORD}
      ADMIN_PORTAL_DB_NAME: ${ADMIN_PORTAL_DB_NAME}
      API_DB_USER: ${API_DB_USER}
      API_DB_PASSWORD: ${API_DB_PASSWORD}
      API_DB_NAME: ${API_DB_NAME}
    ports:
      # Exposto apenas em localhost — nao acessivel externamente
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - undead_postgres_data:/var/lib/postgresql/data
      # Executado automaticamente na primeira subida do container
      - ./infra/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d undead"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: undead-redis
    restart: unless-stopped
    # Autenticacao via senha gerada pelo generate_secrets.py
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      # Exposto apenas em localhost — nao acessivel externamente
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  undead_postgres_data:
