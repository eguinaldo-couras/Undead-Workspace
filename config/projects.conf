# URLs Git dos repositorios. Se vazio, o clone e ignorado.
# Exemplo:
# REPO_UNDEAD_ADMIN_PORTAL_API="git@github.com:org/Undead-Admin-Portal-API.git"

REPO_UNDEAD_ADMIN_PORTAL_API="git@github.com:org/Undead-Admin-Portal-API.git"
REPO_UNDEAD_ADMIN_UI="git@github.com:org/Undead-Admin-UI.git"
REPO_UNDEAD_AI="git@github.com:org/Undead-AI.git"
REPO_UNDEAD_API="git@github.com:org/Undead-API.git"
REPO_UNDEAD_MIGRATIONS="git@github.com:org/Undead-Migrations.git"

# Mapeamento nome da pasta -> URL
# IMPORTANTE: mantenha os nomes das pastas exatamente como no workspace.
declare -A REPO_URLS=(
  ["Undead-Admin-Portal-API"]="$REPO_UNDEAD_ADMIN_PORTAL_API"
  ["Undead-Admin-UI"]="$REPO_UNDEAD_ADMIN_UI"
  ["Undead-AI"]="$REPO_UNDEAD_AI"
  ["Undead-API"]="$REPO_UNDEAD_API"
  ["Undead-Migrations"]="$REPO_UNDEAD_MIGRATIONS"
)

# Projetos Python: recebem .venv e instalacao via pip.
PYTHON_PROJECTS=(
  "Undead-Admin-Portal-API"
  "Undead-API"
  "Undead-Migrations"
)

# Projetos nao-Python: recebem .env quando aplicavel.
NON_PYTHON_PROJECTS=(
  "Undead-Admin-UI"
  "Undead-AI"
)
